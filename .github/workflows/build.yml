name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Release Windows
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify and release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Write-Host "=== Searching for installers ==="
          $exeFiles = Get-ChildItem -Path "src-tauri\target\release\bundle" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue
          $msiFiles = Get-ChildItem -Path "src-tauri\target\release\bundle" -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue

          if ($exeFiles) { Write-Host "Found EXE:"; $exeFiles | ForEach-Object { Write-Host $_.FullName } }
          else { Write-Host "WARNING: No EXE installer found" }
          if ($msiFiles) { Write-Host "Found MSI:"; $msiFiles | ForEach-Object { Write-Host $_.FullName } }
          else { Write-Host "WARNING: No MSI installer found" }

          if (-not $exeFiles -and -not $msiFiles) {
            Write-Error "FATAL: No installers found! Build may have failed."
            exit 1
          }

          if ("$env:GITHUB_REF" -like "refs/tags/v*") {
            $tag = $env:GITHUB_REF -replace "refs/tags/", ""
            Write-Host "Creating version release: $tag"
            gh release create $tag --title "NexTerm $tag" --notes "See the assets to download and install NexTerm."
            if ($exeFiles) { gh release upload $tag $exeFiles[0].FullName }
            if ($msiFiles) { gh release upload $tag $msiFiles[0].FullName }
          } else {
            Write-Host "Creating/updating nightly release"
            gh release delete nightly --yes 2>$null
            gh release create nightly --title "NexTerm Nightly" --notes "Latest build from main branch. Download the installer below." --prerelease
            if ($exeFiles) { gh release upload nightly $exeFiles[0].FullName }
            if ($msiFiles) { gh release upload nightly $msiFiles[0].FullName }
          }