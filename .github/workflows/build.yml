name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Build Windows ──────────────────────────────────────────────────────────
  build:
    name: Build Windows
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Use a stable tag for main branch pushes, real tag for version tags
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'nightly' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('NexTerm {0}', github.ref_name) || 'NexTerm Nightly' }}
          releaseBody: ${{ startsWith(github.ref, 'refs/tags/') && 'See the assets to download and install NexTerm.' || 'Latest build from main branch. Download the installer below.' }}
          releaseDraft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexterm-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe