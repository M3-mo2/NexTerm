name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Release Windows
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      - name: Verify build output
        shell: pwsh
        run: |
          Write-Host "=== NSIS ==="
          Get-ChildItem -Path "src-tauri\target\release\bundle\nsis" -Recurse -File
          Write-Host "=== MSI ==="
          Get-ChildItem -Path "src-tauri\target\release\bundle\msi" -Recurse -File

      - name: Create nightly release
        if: "!startsWith(github.ref, 'refs/tags/')"
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $nsis = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis" -Filter "*.exe" -Recurse | Select-Object -First 1
          $msi = Get-ChildItem -Path "src-tauri\target\release\bundle\msi" -Filter "*.msi" -Recurse | Select-Object -First 1

          if (-not $nsis -and -not $msi) {
            Write-Error "No installers found!"
            exit 1
          }

          # Create or update nightly tag
          gh release delete nightly --yes 2>$null; gh release create nightly --title "NexTerm Nightly" --notes "Latest build from main branch. Download the installer below." --prerelease
          if ($nsis) { gh release upload nightly $nsis.FullName --clobber }
          if ($msi) { gh release upload nightly $msi.FullName --clobber }

      - name: Create version release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $nsis = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis" -Filter "*.exe" -Recurse | Select-Object -First 1
          $msi = Get-ChildItem -Path "src-tauri\target\release\bundle\msi" -Filter "*.msi" -Recurse | Select-Object -First 1

          if (-not $nsis -and -not $msi) {
            Write-Error "No installers found!"
            exit 1
          }

          $tag = $env:GITHUB_REF -replace "refs/tags/", ""
          gh release create $tag --title "NexTerm $tag" --notes "See the assets to download and install NexTerm."
          if ($nsis) { gh release upload $tag $nsis.FullName }
          if ($msi) { gh release upload $tag $msi.FullName }