name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Release Windows
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build

      - name: Collect installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets
          Copy-Item "src-tauri\target\release\bundle\nsis\*.exe" -Destination release-assets\ -ErrorAction SilentlyContinue
          Copy-Item "src-tauri\target\release\bundle\msi\*.msi" -Destination release-assets\ -ErrorAction SilentlyContinue
          Get-ChildItem release-assets

      - name: Create nightly release
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: NexTerm Nightly
          body: Latest build from main branch. Download the installer below.
          files: release-assets/*
          prerelease: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create version release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: NexTerm ${{ github.ref_name }}
          body: See the assets to download and install NexTerm.
          files: release-assets/*
          prerelease: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}