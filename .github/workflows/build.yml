name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Release Windows
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Generate icons
        run: node scripts/generate-icons.mjs

      - name: Build frontend
        run: npx vite build

      - name: Build Tauri app with bundles
        run: npx tauri build --bundles nsis,msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug - list all build output
        shell: pwsh
        run: |
          Write-Host "=== target/release ==="
          Get-ChildItem -Path "src-tauri\target\release" -Filter "*.exe" -ErrorAction SilentlyContinue
          Write-Host "=== bundle dir ==="
          Get-ChildItem -Path "src-tauri\target\release\bundle" -Recurse -ErrorAction SilentlyContinue
          Write-Host "=== full target/release search ==="
          Get-ChildItem -Path "src-tauri\target\release" -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue
          Get-ChildItem -Path "src-tauri\target\release" -Filter "*setup*" -Recurse -ErrorAction SilentlyContinue

      - name: Upload installers and create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exeFiles = Get-ChildItem -Path "src-tauri\target\release" -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "*setup*" -or $_.Name -like "*NexTerm*" }
          $msiFiles = Get-ChildItem -Path "src-tauri\target\release" -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue

          if ($exeFiles) { Write-Host "Found EXE:"; $exeFiles | ForEach-Object { Write-Host $_.FullName } }
          if ($msiFiles) { Write-Host "Found MSI:"; $msiFiles | ForEach-Object { Write-Host $_.FullName } }

          if (-not $exeFiles -and -not $msiFiles) {
            Write-Host "No installers found - uploading raw exe instead"
            $rawExe = Get-ChildItem -Path "src-tauri\target\release" -Filter "nexterm.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $rawExe) {
              Write-Error "FATAL: No build output found at all!"
              exit 1
            }
            $exeFiles = @($rawExe)
          }

          if ("$env:GITHUB_REF" -like "refs/tags/v*") {
            $tag = $env:GITHUB_REF -replace "refs/tags/", ""
            gh release create $tag --title "NexTerm $tag" --notes "See the assets to download and install NexTerm."
          } else {
            gh release delete nightly --yes 2>$null
            gh release create nightly --title "NexTerm Nightly" --notes "Latest build from main branch." --prerelease
            $tag = "nightly"
          }
          if ($exeFiles) { gh release upload $tag $exeFiles[0].FullName --clobber }
          if ($msiFiles) { gh release upload $tag $msiFiles[0].FullName --clobber }